name: isaacsim-drl-test

services:
  double-pendulum:
    image: ${IMAGE_NAME:-isaacsim-drl-double-pendulum}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ISAACSIM_BASE_IMAGE: ${ISAACSIM_BASE_IMAGE:-nvcr.io/nvidia/isaac-sim}
        ISAACSIM_VERSION: ${ISAACSIM_VERSION:-5.0.0}
        ISAACLAB_REPO: ${ISAACLAB_REPO:-https://github.com/isaac-sim/IsaacLab.git}
        ISAACLAB_REF: ${ISAACLAB_REF:-v2.2.1}
    network_mode: host
    ipc: host
    gpus: all
    stdin_open: true
    tty: true
    working_dir: /workspace/isaacsim_DRL_test
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      OMNI_KIT_ALLOW_ROOT: "1"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-all}
      DISPLAY: ${DISPLAY:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_MODE: ${WANDB_MODE:-online}
    volumes:
      - ..:/workspace/isaacsim_DRL_test
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - isaac-kit-cache:/isaac-sim/kit/cache
      - ov-cache:/root/.cache/ov
      - pip-cache:/root/.cache/pip
      - nvidia-gl-cache:/root/.cache/nvidia/GLCache
      - nvidia-compute-cache:/root/.nv/ComputeCache
      - omniverse-logs:/root/.nvidia-omniverse/logs
      - ov-data:/root/.local/share/ov/data

volumes:
  isaac-kit-cache:
  ov-cache:
  pip-cache:
  nvidia-gl-cache:
  nvidia-compute-cache:
  omniverse-logs:
  ov-data:
