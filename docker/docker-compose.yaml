services:
  train:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        ISAACSIM_VERSION: ${ISAACSIM_VERSION:-4.5.0}
        ISAACLAB_VERSION: ${ISAACLAB_VERSION:-v2.2.1}
    image: ${IMAGE_NAME:-double-pendulum-drl:latest}
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      OMNI_KIT_ACCEPT_EULA: "YES"
      OMNI_KIT_ALLOW_ROOT: "1"
    network_mode: host
    ipc: host
    gpus: all
    stdin_open: true
    tty: true
    volumes:
      - training-logs:/workspace/double_pendulum/logs
    command: train

  eval:
    extends: train
    command: eval

  play:
    extends: train
    command: play

  keyboard:
    extends: train
    command: keyboard

  shell:
    extends: train
    command: shell

volumes:
  training-logs:
