params:
  seed: 42

  env:
    clip_observations: 10.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: false
    space:
      continuous:
        mu_activation: None
        sigma_activation: softplus
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: -0.7
        fixed_sigma: true
    mlp:
      units: [128, 128, 64]
      activation: elu
      d2rl: false
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: false
  load_path: ""

  config:
    name: double_pendulum_upright
    env_name: rlgpu
    device: cuda:0
    device_name: cuda:0
    multi_gpu: false
    ppo: true
    mixed_precision: false
    normalize_input: true
    normalize_value: true
    num_actors: -1
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: true
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 500
    save_best_after: 50
    save_frequency: 50
    grad_norm: 1.0
    entropy_coef: 0.01
    truncate_grads: true
    e_clip: 0.2
    horizon_length: 64
    minibatch_size: 32768
    mini_epochs: 6
    critic_coef: 2
    clip_value: true
    seq_length: 4
    bounds_loss_coef: 0.0001
